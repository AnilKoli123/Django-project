<!DOCTYPE html>
<html>
<head>
    <title>CMS</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
        }

        .navbar {
            background: #020617;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
        }

        .navbar h2 {
            margin: 0;
            color: #38bdf8;
        }

        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: white;
            background: #38bdf8;
        }

        .btn-green { background: #22c55e; }
        .btn-yellow { background: #f59e0b; }
        .btn-red { background: #ef4444; }

        .container {
            padding: 20px;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
        }
    </style>
</head>

<body>

<div class="navbar">
    <h2>📚 CMS</h2>
    <a href="/logout/"><button class="btn btn-red">Logout</button></a>
</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
