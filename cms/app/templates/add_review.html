{% extends 'base.html' %}

{% block content %}

<h2>⭐ Add Review</h2>

<div class="card">

<form method="post">
    {% csrf_token %}

    <label>Rating (1 to 5)</label>
    <input type="number" name="rating" min="1" max="5" placeholder="Enter rating">

    <label>Comment</label>
    <textarea name="comment" placeholder="Write your review..."></textarea>

    <button class="btn">Submit Review</button>
</form>

</div>

{% endblock %}
