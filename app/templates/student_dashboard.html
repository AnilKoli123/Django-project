<h2>📚 Available Courses</h2>

{% for c in courses %}
<div class="card">

    <h3>{{ c.title }}</h3>
    <p>👨‍🏫 {{ c.teacher.username }}</p>

    <a href="/enroll/{{c.id}}/">
        <button class="btn">Enroll</button>
    </a>

</div>
{% endfor %}

<hr>

<h2>🎓 My Courses</h2>

{% for e in enrollments %}
<div class="card">

    <h3>{{ e.course.title }}</h3>

</div>
{% empty %}
<p>No courses enrolled yet</p>
{% endfor %}
