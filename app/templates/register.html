{% extends 'base.html' %}
{% block content %}

<h2>Register</h2>

<form method="post">
{% csrf_token %}

<input name="username" placeholder="Username">
<input type="password" name="password" placeholder="Password">

<select name="role">
<option value="student">Student</option>
<option value="teacher">Teacher</option>
</select>

<button class="btn">Register</button>
</form>

{% endblock %}
