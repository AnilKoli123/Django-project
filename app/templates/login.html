<!DOCTYPE html>
<html>
<head>
<style>
body {
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}
.box {
    background:#1e293b;
    padding:30px;
    border-radius:10px;
    width:300px;
}
input, button {
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:5px;
}
button {
    background:#38bdf8;
    color:white;
}
</style>
</head>

<body>
<div class="box">
<h2>Login</h2>

<form method="post">
{% csrf_token %}
<input name="username" placeholder="Username">
<input type="password" name="password" placeholder="Password">
<button>Login</button>
</form>

<a href="/register/">Register</a>
</div>
</body>
</html>
