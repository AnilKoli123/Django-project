{% extends 'base.html' %}
{% block content %}

<h2>Upload Assignment</h2>

<form method="post" enctype="multipart/form-data">
{% csrf_token %}

<input name="title" placeholder="Title">

<select name="course">
{% for c in courses %}
<option value="{{c.id}}">{{c.title}}</option>
{% endfor %}
</select>

<input type="file" name="file">

<button class="btn">Upload</button>

</form>

{% endblock %}
